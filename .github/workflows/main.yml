name: Main

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+.rc[0-9]+'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run:
    if: github.repository_owner == 'powerof3'
    uses: powerof3/pack-skse-mod/.github/workflows/pack.yml@main-vs2022
    with:
      CMAKE_SE_CONFIG_PRESET: 'vs2022-windows-vcpkg-se'
      CMAKE_SE_BUILD_PRESET: 'vs2022-windows-vcpkg-se'
      CMAKE_AE_CONFIG_PRESET: 'vs2022-windows-vcpkg-ae'
      CMAKE_AE_BUILD_PRESET: 'vs2022-windows-vcpkg-ae'
      CMAKE_VR_CONFIG_PRESET: ''
      CMAKE_VR_BUILD_PRESET: ''
      FOMOD_INCLUDE_PDB: true
      FOMOD_MOD_NAME: "Kill Feed"
      FOMOD_MOD_AUTHOR: "powerofthree"
      FOMOD_MOD_NEXUS_ID: "179053"
      FOMOD_REQUIRED_INSTALLATION_DIR: "Skyrim/Data"
      PUBLISH_ARCHIVE_TYPE: '7z'
